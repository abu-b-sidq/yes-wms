# Deploy WMS UAT to k3s. ENTIRE deployment runs on the target machine via SSH.
name: Deploy WMS to UAT (k3s)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (default: latest)"
        required: false
        default: latest

jobs:
  deploy:
    runs-on: ims-runner
    timeout-minutes: 30
    env:
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      K8S_NAMESPACE: uat
      K8S_DEPLOYMENT: rozana-wms-uat
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || '95.217.202.233' }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || 'root' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to k3s on 95.217.202.233 (SSH + run all steps on target)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          # Copy manifests to target (creates /tmp/rozana-wms-uat/ on remote)
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r k8s/uat $DEPLOY_USER@$DEPLOY_HOST:/tmp/rozana-wms-uat

          # Run entire deployment on target machine
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST bash -s << 'REMOTE_SCRIPT'
          set -e
          export ECR_REGISTRY="${{ vars.ECR_REGISTRY }}"
          export ECR_REPOSITORY="${{ vars.ECR_REPOSITORY }}"
          export K8S_NAMESPACE="uat"
          export K8S_DEPLOYMENT="rozana-wms-uat"
          export IMAGE_TAG="${{ github.event.inputs.version || 'latest' }}"
          export AWS_REGION="${{ vars.AWS_REGION || 'ap-south-1' }}"
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export K8S_DIR="/tmp/rozana-wms-uat"

          # Create wms-env secret from /opt/rozana-wms-secrets
          kubectl create namespace $K8S_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
          kubectl delete secret wms-env -n $K8S_NAMESPACE --ignore-not-found
          kubectl create secret generic wms-env -n $K8S_NAMESPACE --from-file=env=/opt/rozana-wms-secrets/.env.uat
          # Create wms-firebase secret so /app/auth/firebase_service_account.json exists in the pod (if file exists on server)
          if [ -f /opt/rozana-wms-secrets/firebase_service_account.json ]; then
            kubectl create secret generic wms-firebase -n $K8S_NAMESPACE --from-file=firebase_service_account.json=/opt/rozana-wms-secrets/firebase_service_account.json --dry-run=client -o yaml | kubectl apply -f -
          else
            kubectl delete secret wms-firebase -n $K8S_NAMESPACE --ignore-not-found
          fi

          # Refresh ECR imagePullSecret (AWS CLI runs on this machine)
          kubectl create secret docker-registry ecr-registry-uat \
            --namespace=$K8S_NAMESPACE \
            --docker-server=$ECR_REGISTRY \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region $AWS_REGION)" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Replace placeholder and apply manifests
          sed -i "s|PLACEHOLDER_ECR_REGISTRY|$ECR_REGISTRY|g; s|PLACEHOLDER_ECR_REPOSITORY|$ECR_REPOSITORY|g" $K8S_DIR/deployment.yaml
          kubectl apply -f $K8S_DIR/namespace.yaml
          kubectl apply -f $K8S_DIR/service.yaml
          kubectl apply -f $K8S_DIR/deployment.yaml
          kubectl apply -f $K8S_DIR/ingress.yaml

          # Set image and rollout
          kubectl set image deployment/$K8S_DEPLOYMENT wms-api=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n $K8S_NAMESPACE
          kubectl rollout restart deployment/$K8S_DEPLOYMENT -n $K8S_NAMESPACE
          kubectl rollout status deployment/$K8S_DEPLOYMENT -n $K8S_NAMESPACE --timeout=15m

          rm -rf /tmp/rozana-wms-uat
          echo "Deployment complete."
          REMOTE_SCRIPT

          rm -f ~/.ssh/deploy_key

      - name: Debug – pod status and logs (on failure)
        if: failure()
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST || '95.217.202.233' }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || 'root' }}
          K8S_NAMESPACE: uat
          K8S_DEPLOYMENT: rozana-wms-uat
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST -- \
            kubectl get pods -n $K8S_NAMESPACE -l app=rozana-wms -o wide && \
            kubectl describe deployment $K8S_DEPLOYMENT -n $K8S_NAMESPACE && \
            kubectl logs -n $K8S_NAMESPACE -l app=rozana-wms --tail=200 --all-containers=true || true
          rm -f ~/.ssh/deploy_key
