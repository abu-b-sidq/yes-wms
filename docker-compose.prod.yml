services:
  redis:
    image: redis:7-alpine
    container_name: wms-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  wms-middleware:
    build: .
    container_name: wms-middleware
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "false"
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command:
      - sh
      - -c
      - |
        python manage.py collectstatic --noinput &&
        python manage.py migrate &&
        gunicorn wms_middleware.asgi:application \
          -k uvicorn.workers.UvicornWorker \
          --bind 0.0.0.0:8000 \
          --workers 4
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/openapi.json')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-worker:
    build: .
    container_name: wms-celery-worker
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "false"
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A wms_middleware worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-beat:
    build: .
    container_name: wms-celery-beat
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "false"
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A wms_middleware beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: wms-web
    restart: unless-stopped
    env_file:
      - .env

  ops-dashboard:
    build:
      context: ./ops-dashboard
      dockerfile: Dockerfile
    container_name: wms-ops-dashboard
    restart: unless-stopped
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: wms-nginx
    restart: unless-stopped
    ports:
      - "8011:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      wms-middleware:
        condition: service_healthy
      web:
        condition: service_started
      ops-dashboard:
        condition: service_started

volumes:
  pgdata:
