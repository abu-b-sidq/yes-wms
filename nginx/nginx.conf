server {
    listen 80;
    server_name wms.yesworks.co.in localhost;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # React (Vite) web app
    location /web/ {
        proxy_pass http://wms-web:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Angular ops dashboard
    location /opsdashboard/ {
        proxy_pass http://wms-ops-dashboard:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Django static files — forward full path so Django can match /backend/static/
    location /backend/static/ {
        proxy_pass http://wms-middleware:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Redirect bare /admin/ paths (Django internal paths) to /backend/admin/
    # Uses 307 to preserve POST method on form submissions
    location ~* ^/admin {
        return 307 /backend$request_uri;
    }

    # Django backend API, admin, ws — strip /backend prefix
    location /backend/ {
        proxy_pass http://wms-middleware:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        # Rewrite Django redirect Location headers that don't already have /backend prefix
        proxy_redirect ~^/(?!backend/)(.+) /backend/$1;
    }

    # Expo mobile web
    location /mobile/ {
        proxy_pass http://wms-mobile:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Default: redirect to /web/
    location = / {
        return 302 /web/;
    }
}
