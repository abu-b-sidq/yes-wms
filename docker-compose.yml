services:
  db:
    image: pgvector/pgvector:pg16
    container_name: wms-db
    environment:
      POSTGRES_DB: yes_wms
      POSTGRES_USER: yes
      POSTGRES_PASSWORD: yes
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wms-redis

  wms-middleware:
    build: .
    container_name: wms-middleware
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: sh -c "python manage.py migrate && uvicorn wms_middleware.asgi:application --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./:/app
    ports:
      - "8010:8000"
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-worker:
    build: .
    container_name: wms-celery-worker
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: sh -c "celery -A wms_middleware worker --loglevel=info"
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-beat:
    build: .
    container_name: wms-celery-beat
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: sh -c "celery -A wms_middleware beat --loglevel=info"
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: wms-ollama
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "11434:11434"

  web:
    image: node:20-alpine
    container_name: wms-web
    working_dir: /app
    env_file:
      - .env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - wms-middleware
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ops-dashboard:
    image: node:20-alpine
    container_name: wms-ops-dashboard
    working_dir: /app
    env_file:
      - .env
    environment:
      API_URL: http://wms-middleware:8000
    command: sh -c "npm install && npm start"
    volumes:
      - ./ops-dashboard:/app
      - ops_dashboard_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - wms-middleware
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  # ollama_data:
  web_node_modules:
  ops_dashboard_node_modules:
