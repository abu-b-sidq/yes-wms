services:
  db:
    image: postgres:16-alpine
    container_name: wms-db
    environment:
      POSTGRES_DB: yes_wms
      POSTGRES_USER: yes
      POSTGRES_PASSWORD: yes
    volumes:
      - pgdata:/var/lib/postgresql/data

  wms-middleware:
    build: .
    container_name: wms-middleware
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command: sh -c "python manage.py migrate && uvicorn wms_middleware.asgi:application --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./:/app
    ports:
      - "8010:8000"
    depends_on:
      - db

volumes:
  pgdata:
