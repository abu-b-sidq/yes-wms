services:
  db:
    image: postgres:16-alpine
    container_name: wms-db
    environment:
      POSTGRES_DB: yes_wms
      POSTGRES_USER: yes
      POSTGRES_PASSWORD: yes
    volumes:
      - pgdata:/var/lib/postgresql/data

  wms-middleware:
    build: .
    container_name: wms-middleware
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command: sh -c "python manage.py migrate && uvicorn wms_middleware.asgi:application --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./:/app
    ports:
      - "8010:8000"
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    container_name: wms-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  web:
    image: node:20-alpine
    container_name: wms-web
    working_dir: /app
    environment:
      VITE_API_TARGET: http://wms-middleware:8000
      VITE_WS_TARGET: ws://wms-middleware:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - wms-middleware

  ops-dashboard:
    image: node:20-alpine
    container_name: wms-ops-dashboard
    working_dir: /app
    environment:
      # Firebase config — set these in your .env file or environment
      FIREBASE_API_KEY: ${FIREBASE_WEB_API_KEY:-}
      FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
    command: sh -c "npm install && npm start"
    volumes:
      - ./ops-dashboard:/app
      - ops_dashboard_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - wms-middleware

volumes:
  pgdata:
  ollama_data:
  web_node_modules:
  ops_dashboard_node_modules:
