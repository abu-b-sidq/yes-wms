services:
  db:
    image: postgres:16-alpine
    container_name: wms-db
    environment:
      POSTGRES_DB: rozana_wms
      POSTGRES_USER: rozana
      POSTGRES_PASSWORD: rozana
    volumes:
      - pgdata:/var/lib/postgresql/data

  wms-middleware:
    build: .
    container_name: wms-middleware
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./:/app
    ports:
      - "8010:8000"
    depends_on:
      - db

volumes:
  pgdata:
