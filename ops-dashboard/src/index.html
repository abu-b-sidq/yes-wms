<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YES WMS — OPS Dashboard</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1512">
  <meta name="description" content="YES WMS Operations Dashboard">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    (() => {
      const storageKey = 'ops-theme';
      const saved = localStorage.getItem(storageKey);
      const systemLight = window.matchMedia('(prefers-color-scheme: light)').matches;
      const isLight = saved === 'light' || (saved !== 'dark' && systemLight);
      const root = document.documentElement;
      root.classList.toggle('light-theme', isLight);
      root.dataset.theme = isLight ? 'light' : 'dark';
      root.style.colorScheme = isLight ? 'light' : 'dark';
      document
        .querySelector('meta[name="theme-color"]')
        ?.setAttribute('content', isLight ? '#eef2e7' : '#0b1512');
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
